<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{speaker.detailPage}">
    <f:then>
        <f:link.page title="{speaker.name}" pageUid="{speaker.detailPage}">
            {content -> f:format.raw()}
        </f:link.page>
    </f:then>
    <f:else>
        <f:if condition="{settings.speakerSinglePid}">
            <f:then>
                <f:link.action pageUid="{settings.speakerSinglePid}" pluginName="Speaker" controller="Speaker" action="show" arguments="{speaker: speaker}" title="{speaker.name}">
                    {content -> f:format.raw()}
                </f:link.action>
            </f:then>
            <f:else>
                {content -> f:format.raw()}
            </f:else>
        </f:if>
    </f:else>
</f:if>
</html>
