<f:if condition="{session}">
    <div class="sessionplaner-sessioninfo">
        <div class="sessionplaner-sessioninfo-title">
            <f:link.action action="show" arguments="{session:session}" title="{session.topic}">{session.topic}</f:link.action>
        </div>
        <div class="sessionplaner-sessioninfo-teaser">
            <f:format.html><f:format.crop maxCharacters="200">{session.description}</f:format.crop></f:format.html>
        </div>
        <f:if condition="{session.speakers} || {session.speaker}">
            <div class="sessionplaner-sessioninfo-speakers-list">
                <f:if condition="{session.speakers}">
                    <f:for each="{session.speakers}" as="speaker">
                        <f:render partial="Speaker/MiniCard" arguments="{settings: settings, speaker: speaker, size: 34}" />
                    </f:for>
                </f:if>
                <f:if condition="!{session.speakers} && {session.speaker}">
                    <div class="sessionplaner-sessionbox-speaker">
                        {session.speaker}
                    </div>
                </f:if>
            </div>
        </f:if>
        <div class="sesionplaner-sessioninfo-info">
            <f:render partial="Session/Box" arguments="{settings: settings, session: session}" />
        </div>
    </div>
</f:if>
