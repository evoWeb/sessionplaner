<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module" />
<f:section name="Content">

    <f:if condition="{currentDay}">
        <f:then>

            <div class="sessionplaner" id="sessionplaner">
                <div class="sessionplaner-title">
                    <h1>
                        <be:link.editRecord uid="{currentDay.uid}" table="tx_sessionplaner_domain_model_day">
                            {currentDay.date -> f:format.date(format:'d.m.y')} -
                            {currentDay.name}
                        </be:link.editRecord>
                    </h1>
                </div>
                <div
                    class="sessionplaner-stash"
                    data-sessionplaner-dragtarget="stash"
                    >
                    <f:for each="{unassignedSessions}" as="session">
                        <f:render partial="BackendModule/SessionCard" arguments="{session: session}" />
                    </f:for>
                </div>
                <f:render partial="BackendModule/Grid" arguments="{day: currentDay}" />
            </div>

        </f:then>
        <f:else>

            <f:format.raw>
                <p><f:translate id="storageFolderEmpty" /></p>
            </f:format.raw>

        </f:else>
    </f:if>

</f:section>
</html>
