name: build

on:
  push:
    branches: [ feature/runTest-update, develop, main ]
    tags: [ '*' ]
  pull_request:
    branches: [ develop ]

jobs:
  resources:
    name: Resources tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Run the xliff lint"
        run: Build/Scripts/runTests.sh -s lintScss

      - name: "Test building the documentation"
        run: Build/Scripts/runTests.sh -s checkRstRenderingSingle

  testsuite:
    name: All php tests for TYPO3 ${{ matrix.packages.core }} with PHP ${{ matrix.packages.php }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        packages:

          - php: '8.1'
            core: '^12.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.2'
            core: '^12.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.2'
            core: '^12.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

          - php: '8.3'
            core: '^12.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.3'
            core: '^12.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

          - php: '8.4'
            core: '^12.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.4'
            core: '^12.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

          - php: '8.5'
            core: '^12.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.5'
            core: '^12.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

          - php: '8.2'
            core: '^13.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.2'
            core: '^13.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

          - php: '8.3'
            core: '^13.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.3'
            core: '^13.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

          - php: '8.4'
            core: '^13.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.4'
            core: '^13.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

          - php: '8.5'
            core: '^13.4'
            framework: 'dev-main'
            prefer: ''
            testpath: 'Tests/Functional'

          - php: '8.5'
            core: '^13.4'
            framework: 'dev-main'
            prefer: '--prefer-lowest'
            testpath: 'Tests/Functional'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint php
        run: |
          Build/Scripts/runTests.sh \
            -p ${{ matrix.packages.php }} \
            -s lintPhp

      - name: Composer install core
        run: |
          Build/Scripts/runTests.sh \
            -p ${{ matrix.packages.php }} \
            -s composer require ${{ matrix.packages.prefer }} "typo3/cms-core:${{ matrix.packages.core }}"

      - name: Composer validate
        run: |
          Build/Scripts/runTests.sh \
            -p ${{ matrix.packages.php }} \
            -s composerValidate

      - name: CGL
        run: |
          Build/Scripts/runTests.sh \
          -p ${{ matrix.packages.php }} \
          -s cgl

      - name: PHPStan
        run: |
          Build/Scripts/runTests.sh \
          -p ${{ matrix.packages.php }} \
          -s phpstan

      - name: "Run the xliff lint"
        run: |
          Build/Scripts/runTests.sh \
          -p ${{ matrix.packages.php }} \
          -n -s normalizeXliff

      - name: Cleanup
        run: Build/Scripts/runTests.sh -s clean

  TERUpload:
    needs: [ resources, testsuite ]
    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest

    name: TYPO3 TER release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to TER
        uses: tomasnorre/typo3-upload-ter@v2
        with:
          api-token: ${{ secrets.TYPO3_API_TOKEN }}
